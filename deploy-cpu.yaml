# ─────────────────────────────────────────────
# Akash SDL - Phi-3-mini-4k LlamaEdge (CPU)
# OpenAI-compatible API server
# ─────────────────────────────────────────────
version: "2.0"

services:
  phi3-api:
    image: ghcr.io/toxmon/phi-3-mini-4k-llamaedge:63008de
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
        http_options:
          max_body_size: 10485760
    env:
      - WASMEDGE_PLUGIN_PATH=/root/.wasmedge/plugin

profiles:
  compute:
    phi3-api:
      resources:
        cpu:
          units: 2
        memory:
          size: 4Gi
        storage:
          size: 1Gi

  placement:
    akash:
      pricing:
        phi3-api:
          denom: uakt
          amount: 5000

deployment:
  phi3-api:
    akash:
      profile: phi3-api
      count: 1
